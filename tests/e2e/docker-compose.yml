# Condor E2E — 5 V09 platforms, no auth (finding detection targets)
# Usage: docker compose -f tests/e2e/docker-compose.yml up -d
# Then:  python tests/e2e/run_e2e.py
name: condor-e2e

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    environment:
      ALLOW_RESET: "true"
      IS_PERSISTENT: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  hayhooks:
    image: deepset/hayhooks:main
    ports:
      - "1416:1416"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1416/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  letta:
    image: lettaai/letta:latest
    ports:
      - "8283:8283"
    environment:
      # No LETTA_SERVER_PASS → open REST API
      LETTA_PG_URI: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8283/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.5.20
    ports:
      - "8080:8080"
    environment:
      WEBUI_AUTH: "False"
      WEBUI_SECRET_KEY: "condor-e2e-insecure-key"
      ENABLE_OLLAMA_API: "False"
      DEFAULT_MODELS: ""
      # Skip HuggingFace model download on startup (avoids 5-10 min delay)
      RAG_EMBEDDING_ENGINE: "openai"
      OPENAI_API_BASE_URL: "http://localhost:9999/v1"
      OPENAI_API_KEY: "condor-dummy"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s
