# Condor E2E — 7 platforms, no auth / misconfigured (finding detection targets)
# V09 platforms: qdrant, chroma, hayhooks, letta, openwebui
# CS01 platforms: flowise, langflow
# Usage: docker compose -f tests/e2e/docker-compose.yml up -d
# Then:  python tests/e2e/run_e2e.py
name: condor-e2e

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    environment:
      ALLOW_RESET: "true"
      IS_PERSISTENT: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  hayhooks:
    image: deepset/hayhooks:main
    ports:
      - "1416:1416"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:1416/status || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  letta:
    image: lettaai/letta:latest
    ports:
      - "8283:8283"
    environment:
      # LETTA_SERVER_PASS set but LETTA_SERVER_SECURE=true absent → CheckPasswordMiddleware
      # never activates → full auth bypass. Simulates a misconfigured production deployment
      # where the operator believes the password is enforced (GHSA-p67m-xf4h-2r78).
      LETTA_SERVER_PASS: "condor-e2e-test-password"
      LETTA_PG_URI: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8283/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.5.20
    ports:
      - "8080:8080"
    environment:
      WEBUI_AUTH: "False"
      WEBUI_SECRET_KEY: "condor-e2e-insecure-key"
      ENABLE_OLLAMA_API: "False"
      DEFAULT_MODELS: ""
      # Skip HuggingFace model download on startup (avoids 5-10 min delay)
      RAG_EMBEDDING_ENGINE: "openai"
      OPENAI_API_BASE_URL: "http://localhost:9999/v1"
      OPENAI_API_KEY: "condor-dummy"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 40s

  # ── CS02 platforms ─────────────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      # Disable all auth layers — simulates bare install without security hardening
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_JWT_AUTH_ACTIVE: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      N8N_ENCRYPTION_KEY: "condor-e2e-insecure-key-32bytes!"
      N8N_SECURE_COOKIE: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      DB_TYPE: "sqlite"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s

  # ── CS03 platforms ─────────────────────────────────────────────────────────

  # Dify code-execution sandbox — port 8194 exposed to simulate a misconfiguration
  # where the operator maps all container ports without isolating the sandbox.
  # The sandbox executes arbitrary Python/Node code with no Dify API auth in front of it.
  dify-sandbox:
    image: langgenius/dify-sandbox:latest
    ports:
      - "8194:8194"
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      WORKER_TIMEOUT: "15"
      ENABLE_NETWORK: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  dify-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: difypassword
      POSTGRES_DB: dify
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify -d dify"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  dify-redis:
    image: redis:6-alpine
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  dify-api:
    image: langgenius/dify-api:latest
    depends_on:
      dify-db:
        condition: service_healthy
      dify-redis:
        condition: service_healthy
      dify-sandbox:
        condition: service_healthy
    ports:
      - "5001:5001"
    environment:
      MODE: api
      SECRET_KEY: sk-condor-e2e-dify-not-for-production-use-only
      INIT_PASSWORD: ""
      DB_USERNAME: dify
      DB_PASSWORD: difypassword
      DB_HOST: dify-db
      DB_PORT: "5432"
      DB_DATABASE: dify
      REDIS_HOST: dify-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://dify-redis:6379/1
      WEB_API_CORS_ALLOW_ORIGINS: "*"
      CONSOLE_CORS_ALLOW_ORIGINS: "*"
      CODE_EXECUTION_ENDPOINT: http://dify-sandbox:8194
      CODE_EXECUTION_API_KEY: dify-sandbox
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      LOG_LEVEL: WARNING
      MIGRATION_ENABLED: "true"
      CHECK_UPDATE_URL: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  # ── CS01 platforms ─────────────────────────────────────────────────────────

  flowise:
    # 1.8.x: auth not enforced when FLOWISE_USERNAME/PASSWORD are empty.
    # 2.x+ forces workspace auth by default — use 1.8.x for E2E finding detection.
    # Port 3000 is in Windows Hyper-V excluded range (2971-3070) — mapped to 3200.
    image: flowiseai/flowise:1.8.2
    ports:
      - "3200:3000"
    environment:
      FLOWISE_USERNAME: ""
      FLOWISE_PASSWORD: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/chatflows || exit 1"]
      # Note: healthcheck runs inside container (port 3000), host accesses via 3200
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  langflow:
    # LANGFLOW_AUTO_LOGIN=true: web UI auto-logs in without credentials.
    # Simulates the common misconfiguration where operators enable this for convenience
    # without realizing it allows unauthenticated API access patterns.
    image: langflowai/langflow:latest
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_AUTO_LOGIN: "true"
      LANGFLOW_SUPERUSER: "admin"
      LANGFLOW_SUPERUSER_PASSWORD: "admin"
      LANGFLOW_SECRET_KEY: "condor-e2e-insecure-key"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7860/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
